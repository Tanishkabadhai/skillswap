<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | SkillSwap</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell auth-page-shell">
      <a class="back-link" href="/">Back to home</a>
      <main class="auth-layout">
        <section class="card auth-side-panel">
          <div class="auth-logo-row">
            <img class="brand-logo" src="/assets/skillswap-logo.png" alt="SkillSwap logo" />
          </div>
          <p class="eyebrow">Join the network</p>
          <h2 class="auth-title">Build your profile and start teaching what you know.</h2>
          <p class="hero-copy">
            Create your SkillSwap account to list your strengths, discover collaborators, and turn learning into a
            shared experience.
          </p>
        </section>
        <section class="card auth-card">
          <p class="eyebrow">Create account</p>
          <h3>Start your SkillSwap profile</h3>
          <form id="register-form" class="stack-form">
            <input type="text" id="register-name" placeholder="Full name" required />
            <input type="email" id="register-email" placeholder="Email address" required />
            <input type="password" id="register-password" placeholder="Password" required />
            <button type="submit" class="primary-btn">Create account</button>
          </form>
          <p class="helper-text auth-helper">Already registered? <a href="/login">Login here</a>.</p>
        </section>
      </main>
    </div>
    <div id="toast" class="toast hidden"></div>
    <script src="/auth.js"></script>
  </body>
</html>
