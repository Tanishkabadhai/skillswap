<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | SkillSwap</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell auth-page-shell">
      <a class="back-link" href="/">Back to home</a>
      <main class="auth-layout">
        <section class="card auth-side-panel">
          <div class="auth-logo-row">
            <img class="brand-logo" src="/assets/skillswap-logo.png" alt="SkillSwap logo" />
          </div>
          <p class="eyebrow">Welcome back</p>
          <h2 class="auth-title">Continue your next exchange.</h2>
          <p class="hero-copy">
            Sign in to manage your profile, open messages, track requests, and keep your learning flow moving.
          </p>
        </section>
        <section class="card auth-card">
          <p class="eyebrow">Sign in</p>
          <h3>Login to SkillSwap</h3>
          <form id="login-form" class="stack-form">
            <input type="email" id="login-email" placeholder="Email address" required />
            <input type="password" id="login-password" placeholder="Password" required />
            <button type="submit" class="primary-btn">Login</button>
          </form>
          <p class="helper-text auth-helper">Need an account? <a href="/register">Create one here</a>.</p>
        </section>
      </main>
    </div>
    <div id="toast" class="toast hidden"></div>
    <script src="/auth.js"></script>
  </body>
</html>
